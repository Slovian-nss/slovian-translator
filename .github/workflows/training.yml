name: Slovian Engine

on:
  push:
    paths:
      - '**.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # TO JEST KLUCZ: Daje botowi prawo do robienia 'git push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run Learning Script
        run: python app.py

      - name: Save Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'SlovianBot'
          git config --global user.email 'bot@slovian.org'
          
          if [ -f osnova.json ]; then
            git add osnova.json
            git commit -m "Auto-clean dictionary: $(date +'%Y-%m-%d %H:%M')" || exit 0
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          else
            echo "Błąd: Nie znaleziono pliku osnova.json"
            exit 1
          fi
