name: Slovian Engine
on:
  push:
    paths:
      - '**.json' # Uruchom tylko gdy zmienisz bazę słów
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Learning Script
        run: python app.py
      - name: Save Changes
        run: |
          git config --global user.name 'SlovianBot'
          git config --global user.email 'bot@slovian.org'
          git add osnova.json
          git commit -m "Auto-clean dictionary" || exit 0
          git push
