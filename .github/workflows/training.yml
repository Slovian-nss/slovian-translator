name: Slovian Engine

on:
  push:
    paths:
      - '**.json' # Uruchom tylko gdy nastąpi zmiana w plikach JSON

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Niezbędne, aby bot mógł wysłać (push) zmiany do repozytorium
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pobiera pełną historię, co zapobiega błędom przy pushu

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run Learning Script
        run: python app.py

      - name: Save Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Konfiguracja tożsamości bota
          git config --global user.name 'SlovianBot'
          git config --global user.email 'bot@slovian.org'
          
          # Sprawdzenie czy plik wynikowy istnieje
          if [ -f osnova.json ]; then
            git add osnova.json
            
            # Commit nastąpi tylko, jeśli w pliku osnova.json zaszły realne zmiany
            # "|| exit 0" sprawia, że jeśli nie ma zmian, workflow nie zaświeci się na czerwono
            git commit -m "Auto-clean dictionary: $(date +'%Y-%m-%d %H:%M')" || exit 0
            
            # Wypchnięcie zmian przy użyciu tokenu autoryzacyjnego
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          else
            echo "BŁĄD: Plik osnova.json nie został znaleziony po uruchomieniu skryptu."
            exit 1
          fi
