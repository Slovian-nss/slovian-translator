<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perkladačь slověnьskogo ęzyka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0055ff; --bg: #f3f6f9; --text: #1a1a1a; --border: #d1d9e0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 1000px; width: 100%; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .translator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .label-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 600; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; resize: none; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .btn-small { background: #eee; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .admin-panel { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; width: 100%; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">🌐 Perkladačь slověnьskogo ęzyka</h1>
    
    <div id="dbStatus" style="text-align: center; font-size: 12px; margin-bottom: 10px;">
        <span class="status-dot" style="background: #bbb;"></span> Ładowanie baz danych...
    </div>

    <div style="text-align: center;">
        <label><input type="radio" name="dir" value="pl_sl" checked> PL ➔ SL</label>
        <label style="margin-left: 20px;"><input type="radio" name="dir" value="sl_pl"> SL ➔ PL</label>
    </div>

    <div class="translator-grid">
        <div>
            <div class="label-bar"><span>Tekst źródłowy</span><button class="btn-small" id="btnPaste">📋 Wklej</button></div>
            <textarea id="srcText" placeholder="Wpisz tekst..."></textarea>
        </div>
        <div>
            <div class="label-bar"><span>Wynik</span><button class="btn-small" id="btnCopy">✂️ Kopiuj</button></div>
            <textarea id="resText" readonly placeholder="Tłumaczenie pojawi się tutaj..."></textarea>
        </div>
    </div>

    <button class="main-btn" id="runTranslate">🚀 TŁUMACZ</button>

    <div class="admin-panel">
        <h3>🛠️ Popraw bazę (Admin)</h3>
        <input type="password" id="pass" style="padding:8px; border-radius:5px; border:1px solid #ccc;" placeholder="Hasło">
        <button class="btn-small" id="btnLogin">Zaloguj</button>
        <div id="adminForm" style="display:none; margin-top:10px;">
            <input type="text" id="newPl" placeholder="Słowo PL">
            <input type="text" id="newSl" placeholder="Słowo SL">
            <button class="btn-small" onclick="alert('Zapisano tymczasowo w pamięci!')">Dodaj</button>
        </div>
    </div>
</div>

<script>
let osnova = [];
let vuzor = {};
let memory = {};

// Funkcja ładowania danych dostosowana do GitHub Pages
async function loadData() {
    const status = document.getElementById('dbStatus');
    try {
        const t = Date.now();
        // Pobieramy pliki z wymuszeniem braku cache
        const [resO, resV, resM] = await Promise.all([
            fetch('./osnova.json?t=' + t).then(r => r.json()),
            fetch('./vuzor.json?t=' + t).then(r => r.json()),
            fetch('./memory.json?t=' + t).then(r => r.json()).catch(() => ({}))
        ]);
        
        osnova = resO;
        vuzor = resV;
        memory = resM;

        status.innerHTML = '<span class="status-dot" style="background: #28a745;"></span> Baza załadowana (' + osnova.length + ' słów)';
    } catch (e) {
        console.error(e);
        status.innerHTML = '<span class="status-dot" style="background: #dc3545;"></span> Błąd ładowania JSON. Sprawdź czy pliki są w repozytorium.';
    }
}

function translateWord(word, dir) {
    let low = word.toLowerCase();
    
    // 1. Sprawdź memory.json
    if (memory[low]) return memory[low];

    // 2. Szukaj w osnova.json
    for (let item of osnova) {
        let src = dir === 'pl_sl' ? item.polish : item.slovian;
        let trg = dir === 'pl_sl' ? item.slovian : item.polish;

        if (src && src.toLowerCase() === low) {
            let res = trg;
            // Dodaj końcówkę z vuzor.json jeśli kierunek to PL -> SL
            if (dir === 'pl_sl' && item.vuzor && vuzor[item.vuzor]) {
                res += (vuzor[item.vuzor].nom || "");
            }
            return res;
        }
    }
    return word; // Jeśli nie znaleziono, zwróć oryginał
}

document.getElementById('runTranslate').onclick = () => {
    const text = document.getElementById('srcText').value;
    const dir = document.querySelector('input[name="dir"]:checked').value;
    
    // Rozbijanie tekstu z zachowaniem spacji i znaków interpunkcyjnych
    const tokens = text.split(/(\W+)/u);
    
    const result = tokens.map(t => {
        if (!t || /^\W+$/u.test(t)) return t;
        
        let trans = translateWord(t, dir);
        
        // Zachowanie wielkości liter
        if (t === t.toUpperCase()) return trans.toUpperCase();
        if (t[0] === t[0].toUpperCase()) return trans.charAt(0).toUpperCase() + trans.slice(1);
        return trans;
    });

    document.getElementById('resText').value = result.join("");
};

// Funkcje pomocnicze przywrócone
document.getElementById('btnCopy').onclick = () => {
    const res = document.getElementById('resText');
    res.select();
    document.execCommand('copy');
    alert("Skopiowano wynik!");
};

document.getElementById('btnPaste').onclick = async () => {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('srcText').value = text;
    } catch (e) {
        alert("Wklej tekst ręcznie (Ctrl+V)");
    }
};

document.getElementById('btnLogin').onclick = () => {
    if (document.getElementById('pass').value === "Rozeta*8") {
        document.getElementById('adminForm').style.display = "block";
    } else {
        alert("Złe hasło");
    }
};

loadData();
</script>
</body>
</html>
