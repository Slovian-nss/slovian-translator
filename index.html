<script>
let osnova = [];
let vuzor = {};
let memory = {};

async function initTranslator() {
    try {
        // Dodajemy parametr cache: "no-store", aby GitHub nie serwował starych wersji plików JSON
        const [resO, resV, resM] = await Promise.all([
            fetch('osnova.json', {cache: "no-store"}).then(r => r.json()),
            fetch('vuzor.json', {cache: "no-store"}).then(r => r.json()),
            fetch('memory.json', {cache: "no-store"}).then(r => r.json()).catch(() => ({}))
        ]);
        
        osnova = resO;
        vuzor = resV;
        memory = resM;
        console.log("Bazy załadowane.");
    } catch (e) {
        console.error("Błąd ładowania:", e);
    }
}

initTranslator();

function flexWord(word, direction) {
    let lowWord = word.toLowerCase();

    // 1. Priorytet: Pamięć podręczna (memory.json)
    if (memory[lowWord]) return memory[lowWord];

    // 2. Szukanie w osnova.json
    for (let item of osnova) {
        let sourceField = (direction === 'pl_sl') ? 'polish' : 'slovian';
        let targetField = (direction === 'pl_sl') ? 'slovian' : 'polish';

        if (item[sourceField].toLowerCase() === lowWord) {
            let baseResult = item[targetField];
            
            // Jeśli tłumaczymy na słowiański i jest wzór odmiany (vuzor)
            if (direction === 'pl_sl' && item.vuzor && vuzor[item.vuzor]) {
                let suffix = vuzor[item.vuzor].nom || ""; 
                return baseResult + suffix;
            }
            
            return baseResult;
        }
    }
    return word; 
}

function handleTranslate() {
    const text = document.getElementById('srcText').value;
    const direction = document.querySelector('input[name="dir"]:checked').value;
    if (!text) return;

    const tokens = text.split(/(\W+)/);
    
    const translated = tokens.map(token => {
        if (/^\W+$/.test(token)) return token; 
        
        let result = flexWord(token, direction);
        
        // Logika wielkich liter
        if (token === token.toUpperCase()) return result.toUpperCase();
        if (token[0] === token[0].toUpperCase()) {
            return result.charAt(0).toUpperCase() + result.slice(1);
        }
        return result;
    });

    document.getElementById('resText').value = translated.join("");
}

// Logika przycisków
document.getElementById('btnPaste').onclick = async () => {
    const text = await navigator.clipboard.readText();
    document.getElementById('srcText').value = text;
};

document.getElementById('btnCopy').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('resText').value);
    alert("Skopiowano!");
};

document.getElementById('btnLogin').onclick = () => {
    if (document.getElementById('pass').value === "Rozeta*8") {
        document.getElementById('adminForm').style.display = "block";
    }
};
</script>
